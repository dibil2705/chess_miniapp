  <style>
    :root{
      --dark:#769656;
      --light:#eeeed2;
      --bg:#111;
      --panel:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --text:#fff;
      --tg-safe-area-top:0px;
      --app-safe-top:max(env(safe-area-inset-top), var(--tg-safe-area-top));
    }
    *, *::before, *::after{ box-sizing: border-box; }
    body{
      margin:0;
      padding:calc(72px + var(--app-safe-top)) 16px 120px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }
    .wrap{
      max-width: 1180px;
      width: min(1180px, 100%);
      margin:0 auto;
      display:grid;
      gap:14px;
    }
    .layout{ display:flex; flex-direction:column; gap:14px; align-items:stretch; border:none; }
    .top-bar{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:10px;
    }
    .back-btn{
      position: fixed;
      top: calc(14px + var(--app-safe-top));
      right: 12px;
      padding:10px 12px;
      border-radius:12px;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      color:#fff;
      cursor:pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.28);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      width: fit-content;
      z-index: 20;
    }
    .back-btn:active{ transform: translateY(1px); }
    .panel{
      padding:14px;
      border-radius:12px;
      border:1px solid var(--border);
      background: none;
    }
    .panel.board-panel{ border:none; }
    h2{ margin:0 0 6px 0; }
    code{ word-break: break-all; }
    .status{ opacity:.85; margin:4px 0 0 0; font-size:14px; }
    .list{ margin:10px 0 0 0; padding:0; list-style:none; display:grid; gap:10px; }
    .list li{ border:1px solid var(--border); border-radius:10px; padding:10px; background: rgba(0,0,0,.35); }
    .actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .btn{ cursor:pointer; border:1px solid var(--border); background:rgba(255,255,255,.08); color:var(--text); padding:10px 14px; border-radius:10px; font-weight:600; }
    .btn:disabled{ opacity:.5; cursor:not-allowed; }
    .mono{
      font-family: ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    /* board */
    .board-panel{ display:grid; gap:12px; justify-items:center; }
    .board-wrapper{
      position: relative;
      width:min(620px, 100%);
      margin:0 auto;
      display:grid;
      grid-template-columns: 34px auto 1fr;
      grid-template-rows: 1fr auto;
      grid-template-areas:
        "cp ranks board"
        "cp . files";
      column-gap: 10px;
      row-gap: 8px;
      align-items: stretch;
    }
    .board{
      grid-area: board;
      width:100%;
      aspect-ratio: 1 / 1;
      display:block;
      border-radius:14px;
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      touch-action: none;
      position:relative;
    }
    .board-squares{
      display:grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      grid-auto-rows: 1fr;
      width:100%;
      height:100%;
    }
    .board-arrows{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .arrow-path{
      stroke:#6ccf70;
      stroke-width:10;
      stroke-linecap:round;
      stroke-linejoin:round;
      fill:none;
      opacity:0.65;
    }
    .arrow-head{
      fill:#6ccf70;
      opacity:0.65;
    }
    .eval-bar{
      grid-area: cp;
      position: relative;
      width: 100%;
      background:
        linear-gradient(90deg, rgba(255,255,255,.14), rgba(255,255,255,.02) 28%, rgba(255,255,255,.02) 72%, rgba(255,255,255,.12)),
        linear-gradient(180deg, #3d3b37 0%, #2d2b28 50%, #252320 100%);
      border-radius: 10px;
      overflow:hidden;
      border:1px solid var(--border);
    }
    .eval-fill{
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.82), #fff 45%, #f6f6f6 55%, rgba(255,255,255,.82)),
        linear-gradient(180deg, #fff 0%, #f3f3f3 52%, #e8e8e8 100%);
      transition:height .28s ease;
      height:0;
      z-index:1;
    }
    .eval-label{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      color:#fff;
      mix-blend-mode:difference;
      font-size:10px;
      line-height:1;
      font-weight:800;
      pointer-events:none;
      z-index:3;
    }
    .coord-files,
    .coord-ranks{
      pointer-events: none;
      color: rgba(255,255,255,.8);
      font-weight: 700;
      font-size: clamp(11px, 2.5vw, 14px);
    }
    .coord-files{
      grid-area: files;
      display:grid;
      grid-template-columns: repeat(8, 1fr);
      text-align: center;
      padding: 0 4px 0 0;
    }
    .coord-ranks{
      grid-area: ranks;
      display:grid;
      grid-template-rows: repeat(8, 1fr);
      align-items: center;
      justify-items: end;
      width: 13px;
      padding-right: 2px;
      align-self: stretch;
      height: 100%;
    }
    .sq{
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: clamp(22px, 6vw, 44px);
      line-height: 1;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      position: relative;
    }
    .light{ background:var(--light); }
    .dark{ background:var(--dark); }
    .sq.king-check::after{
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,64,64,.45), rgba(255,64,64,0));
      box-shadow: inset 0 0 0 1px rgba(255,64,64,.25), 0 0 12px rgba(255,64,64,.55);
      pointer-events: none;
      z-index: 0;
    }
    .piece{
      width: auto;
      height: auto;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height: 1;
      pointer-events: none;
      position: relative;
      z-index: 1;
    }
    .piece img{ width: 140.712%; height: 140.712%; display:block; user-select:none; -webkit-user-select:none; }
    .sq.selected{ outline: 3px solid rgba(255,255,255,.4); outline-offset:-3px; }
    .sq .move-dot{
      position:absolute;
      width:18%;
      height:18%;
      border-radius:50%;
      background:rgba(0,0,0,.35);
      pointer-events:none;
    }
    .sq.light .move-dot{ background: rgba(0,0,0,.5); }
    .sq.dark .move-dot{ background: rgba(255,255,255,.5); }
    .sq .capture-ring{
      position: absolute;
      inset: 8%;
      border-radius: 10px;
      pointer-events: none;
      z-index: 0;
    }
    .history-bar{
      width:100%;
      background:
        linear-gradient(180deg, rgba(76,76,76,.16) 0%, rgba(34,34,34,.14) 100%),
        rgba(0,0,0,.18);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 12px 10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .history-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      width:100%;
    }
    .history-head .status{ margin:2px 0 0 0; font-size:12px; opacity:.7; }
    .history-controls{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      transform: none;
      width: 100%;
      display:flex;
      gap:12px;
      justify-content:space-between;
      align-items:center;
      padding:12px 12px calc(12px + env(safe-area-inset-bottom));
      border-radius:16px 16px 0 0;
      border:1px solid var(--border);
      background: rgba(0,0,0,.7);
      box-shadow: 0 18px 46px rgba(0,0,0,.55);
      backdrop-filter: blur(12px);
      z-index:5000;
    }
    .history-btn{
      flex:1;
      min-width:0;
      height:68px;
      display:grid;
      place-items:center;
      padding:0;
      border-radius:14px;
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,.04) 100%);
      color:var(--text);
      cursor:pointer;
      font-size: clamp(20px, 5vw, 26px);
      transition: background .15s ease, transform .1s ease, box-shadow .15s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      backdrop-filter: inherit;
    }
    .history-btn .iconify{
      font-size: clamp(22px, 6vw, 30px);
      color: currentColor;
    }
    .history-btn:active{ transform: translateY(1px); }
    .history-btn:disabled{ opacity:.45; cursor:not-allowed; }
    @media (max-width: 640px){
      .wrap{ padding: 0; width: 100%; max-width: none; }
      body{ padding-left: 10px; padding-right: 0; }
      .board-panel{ justify-items: stretch; }
      .board-wrapper{
        width: 100%;
        margin: 0;
        grid-template-columns: 30px 13px 1fr;
        grid-template-rows: 1fr auto;
        grid-template-areas:
          "cp ranks board"
          "cp ranks files";
        column-gap: 6px;
        row-gap: 6px;
      }
      .coord-ranks{ justify-items: start; padding-right: 0; margin-left: 4px; }
      .coord-files{ padding: 0; }
    }
    @media (max-width: 520px){
      .history-controls{
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
        gap: 10px;
      }
      .history-btn{ height:60px; font-size: clamp(18px, 6vw, 24px); }
    }
    .priority-wrap{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:stretch;
      text-align:left;
      border:none;
      padding:0;
      background:none;
      width:100%;
    }
    .priority-title{
      font-weight:800;
      font-size:18px;
      opacity:1;
      letter-spacing:0.3px;
    }
    .priority-moves{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap:12px;
      width:100%;
    }
    .priority-item{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:14px;
      border-radius:12px;
      background: linear-gradient(180deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.01) 100%);
      border:1px solid var(--border);
      cursor:pointer;
      transition: border-color .12s ease, box-shadow .12s ease, transform .08s ease;
      outline:none;
    }
    .priority-item:focus-visible{ box-shadow: 0 0 0 3px rgba(207,224,247,.25); border-color: rgba(207,224,247,.6); }
    .priority-item:active{ transform: translateY(1px); }
    .priority-item.is-empty{ cursor: default; }
    .priority-head{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap: wrap;
    }
    .priority-piece-icon{
      display:grid;
      place-items:center;
      width:38px;
      height:38px;
      border-radius:10px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:#cfe0f7;
      font-size:28px;
      flex-shrink:0;
    }
    .priority-move{
      font-weight:800;
      letter-spacing:0.3px;
      font-size:18px;
      display:flex;
      align-items:center;
      gap:6px;
    }
    .priority-index{ color:#cfe0f7; }
    .priority-score{
      margin-left:auto;
      padding:4px 8px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      font-weight:700;
      font-size:13px;
    }
    .priority-pv{
      font-size:14px;
      opacity:.9;
      line-height:1.4;
    }
    .history-body{
      display:grid;
      gap:10px;
      max-height:360px;
      overflow:auto;
      padding-right:6px;
      scroll-behavior:smooth;
    }
    .history-body::-webkit-scrollbar{ width:8px; }
    .history-body::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.2); border-radius:999px; }
    .history-body::-webkit-scrollbar-track{ background:rgba(255,255,255,.06); }
    .analysis-history{
      --tree-step: 30px;
      --tree-trunk-x: 20px;
      --tree-muted-line: rgba(150,158,172,.16);
      --tree-line: rgba(150,158,172,.30);
      --tree-active-line: rgba(244,232,196,.92);
      position:relative;
      display:flex;
      flex-direction:column;
      gap:6px;
      padding:6px 8px 8px 42px;
      margin:0;
      width:100%;
      background:transparent;
      border-radius:12px;
    }
    .analysis-history::before{
      content:"";
      position:absolute;
      left:var(--tree-trunk-x);
      top:24px;
      bottom:22px;
      width:0;
      border-left:2px solid var(--tree-line);
      pointer-events:none;
    }
    .analysis-history.has-active-branch::before{
      border-left-color:rgba(150,158,172,.12);
    }
    .analysis-history:empty::before{ display:none; }
    .move-row{
      display:grid;
      grid-template-columns: 42px 1fr 1fr;
      align-items:stretch;
      background: rgba(0,0,0,.35);
      border:1px solid var(--border);
      border-radius:10px;
      overflow:hidden;
    }
    .board-meta{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:flex-start;
      gap:8px;
      width:100%;
      text-align:left;
    }
    .analysis-status{
      margin:0;
      padding:0;
      border-radius:0;
      border:none;
      background:none;
      font-weight:600;
    }
    .move-num{
      display:grid;
      place-items:center;
      font-weight:700;
      font-size:14px;
      background:rgba(255,255,255,.04);
      border-right:1px solid var(--border);
      min-width:42px;
    }
    .move-col{
      padding:8px 10px;
      font-weight:600;
      display:flex;
      align-items:center;
      min-height:36px;
      position:relative;
    }
    .move-col::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      opacity:0;
      transition:opacity .12s ease;
      z-index:0;
    }
    .move-col span{ position:relative; z-index:1; }
    .move-col.is-active::after{ opacity:1; }
    .move-col.is-empty{ opacity:.45; font-weight:500; }
    .move-tree-node{
      position:relative;
      display:grid;
      grid-template-columns: 42px minmax(76px, 1fr) minmax(76px, 1fr) 72px;
      align-items:center;
      gap:12px;
      margin-left:calc(var(--tree-depth, 0) * var(--tree-step));
      width:calc(100% - (var(--tree-depth, 0) * var(--tree-step)));
      min-width:430px;
      min-height:38px;
      padding:7px 10px;
      color:var(--text);
      text-align:left;
      border:1px solid transparent;
      border-radius:8px;
      background:transparent;
      cursor:pointer;
      font-size:15px;
    }
    .move-tree-node::before{
      content:"";
      position:absolute;
      left:calc(var(--tree-step) * -1 + 6px);
      top:-7px;
      width:24px;
      height:calc(50% + 7px);
      border-left:2px solid var(--tree-line);
      border-bottom:2px solid var(--tree-line);
      border-bottom-left-radius:7px;
      pointer-events:none;
      transition:border-color .16s ease, opacity .16s ease, box-shadow .16s ease;
    }
    .move-tree-node::after{
      content:"";
      position:absolute;
      left:calc(var(--tree-step) * -1 + 6px);
      top:-7px;
      bottom:-7px;
      width:0;
      border-left:2px solid var(--tree-muted-line);
      pointer-events:none;
      transition:border-color .16s ease, opacity .16s ease, box-shadow .16s ease;
    }
    .move-tree-node.is-mainline::before{
      display:none;
    }
    .move-tree-node.is-mainline::after,
    .move-tree-node.is-root::after{
      display:none;
    }
    .move-tree-node.is-nested:not(.is-variation)::before{
      display:none;
    }
    .move-tree-node.is-variation{
      background:transparent;
    }
    .move-tree-node.is-variation::before{
      border-left-color:var(--tree-line);
      border-bottom-color:var(--tree-line);
    }
    .analysis-history.has-active-branch .move-tree-node.is-muted{
      opacity:.46;
    }
    .analysis-history.has-active-branch .move-tree-node.is-muted::before,
    .analysis-history.has-active-branch .move-tree-node.is-muted::after{
      border-color:rgba(150,158,172,.10);
      opacity:.55;
    }
    .move-tree-node.is-branch::before,
    .move-tree-node.is-branch::after{
      border-color:var(--tree-active-line);
      opacity:1;
      box-shadow:0 0 10px rgba(244,232,196,.20);
    }
    .move-tree-node.is-mainline.is-branch::after{
      display:block;
      left:-22px;
      top:-7px;
      bottom:-7px;
      border-left-color:var(--tree-active-line);
    }
    .move-tree-node.is-current-node::after{
      bottom:50%;
    }
    .move-tree-node.is-active{
      border-color:rgba(244,232,196,.56);
      box-shadow:0 0 0 1px rgba(244,232,196,.14), 0 10px 24px rgba(0,0,0,.24);
      background:linear-gradient(180deg, rgba(160,150,122,.22), rgba(24,24,24,.30));
    }
    .move-tree-node.is-root{
      grid-template-columns: 1fr 72px;
      margin-left:0;
      max-width:100%;
      width:100%;
      min-width:260px;
      background:transparent;
    }
    .move-tree-node.is-root::before{ display:none; }
    .move-tree-node.is-root .move-tree-prefix{ display:none; }
    .move-tree-prefix{
      position:relative;
      opacity:.76;
      font-weight:800;
      font-size:15px;
      text-align:right;
      color:rgba(235,241,255,.82);
      transition:color .16s ease, opacity .16s ease;
    }
    .move-tree-node.is-mainline .move-tree-prefix::before{
      content:"";
      position:absolute;
      left:-35px;
      top:50%;
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(170,178,192,.82);
      box-shadow:0 0 0 3px rgba(170,178,192,.10);
      transform:translateY(-50%);
      transition:background .16s ease, box-shadow .16s ease, opacity .16s ease;
    }
    .move-tree-node.is-mainline .move-tree-prefix::after{
      content:"";
      position:absolute;
      left:-30px;
      top:50%;
      width:24px;
      border-top:2px solid var(--tree-line);
      transform:translateY(-50%);
      transition:border-color .16s ease, box-shadow .16s ease, opacity .16s ease;
    }
    .move-tree-node.is-mainline.is-branch .move-tree-prefix::before{
      background:var(--tree-active-line);
      box-shadow:0 0 0 4px rgba(244,232,196,.16), 0 0 12px rgba(244,232,196,.28);
    }
    .move-tree-node.is-mainline.is-branch .move-tree-prefix::after{
      border-top-color:var(--tree-active-line);
      box-shadow:0 0 10px rgba(244,232,196,.18);
    }
    .move-tree-move{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-weight:800;
      color:rgba(255,255,255,.93);
      text-shadow:0 1px 2px rgba(0,0,0,.35);
      transition:color .16s ease, text-shadow .16s ease, opacity .16s ease;
    }
    .move-tree-move.is-selected{
      color:#fff4cf;
      text-shadow:0 0 10px rgba(244,232,196,.36), 0 1px 2px rgba(0,0,0,.45);
    }
    .move-tree-move.is-empty{
      opacity:.18;
    }
    .move-tree-eval{
      justify-self:end;
      min-width:66px;
      padding:5px 9px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      color:rgba(245,248,255,.92);
      font-size:14px;
      font-weight:800;
      text-align:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }
    .history-empty{ opacity:.7; font-size:14px; padding:4px 0 2px; }
    .promotion-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 20px;
    }
    .promotion-overlay.active{ display:flex; }
    .promotion-dialog{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      max-width: 320px;
      width: 100%;
    }
    .promotion-title{ margin: 0 0 12px 0; font-weight: 700; }
    .promotion-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
    .promotion-btn{
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      color: var(--text);
      cursor: pointer;
    }
    .promotion-btn:active{ transform: translateY(1px); }
    .promotion-icon{ width: 36px; height: 36px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-bar">
      <a class="back-btn" href="index.html">
        <span class="iconify" data-icon="mdi:chevron-left" aria-hidden="true"></span>

          <div class="eval-bar" aria-hidden="true">

          <span>Ферзь</span>
        </button>
        <button class="promotion-btn" data-piece="r">
          <img class="promotion-icon" alt="" src="icone/white/Chess_rlt45.svg" />
          <span>Ладья</span>
        </button>
        <button class="promotion-btn" data-piece="b">
          <img class="promotion-icon" alt="" src="icone/white/Chess_blt45.svg" />
          <span>Слон</span>
        </button>
        <button class="promotion-btn" data-piece="n">
          <img class="promotion-icon" alt="" src="icone/white/Chess_nlt45.svg" />
          <span>Конь</span>
        </button>
