<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Турниры Красная Поляна</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @font-face{
      font-family:"LiteraturnayaMenu";
      src:url("assets/font/TEST-literaturnaya_book.otf") format("opentype");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg:#111;
      --text:#f2eee5;
      --gold:#c19154;
      --tg-safe-area-top:0px;
      --app-safe-top:max(env(safe-area-inset-top), var(--tg-safe-area-top));
    }

    *, *::before, *::after{ box-sizing:border-box; }
    html{ min-height:100%; min-height:100svh; min-height:100dvh; background:var(--bg); -webkit-text-size-adjust:100%; }
    body{
      margin:0;
      min-height:100%;
      min-height:100svh;
      min-height:100dvh;
      padding:calc(124px + var(--app-safe-top)) 12px calc(18px + env(safe-area-inset-bottom));
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 112%, rgba(118,150,86,.16), transparent 42%),
        linear-gradient(160deg, #171817 0%, #0f100f 48%, #0a0b0a 100%);
      overflow-x:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    .page{
      position:relative;
      z-index:1;
      width:min(100%, 430px);
      margin:0 auto;
      display:grid;
      gap:28px;
    }

    .back-link{
      --liquid-position: fixed;
      --liquid-overflow: visible;
      position:fixed;
      top:calc(62px + var(--app-safe-top));
      left:10px;
      z-index:10;
      min-width:46px;
      min-height:46px;
      padding:10px 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      color:var(--text);
      text-decoration:none;
      font-weight:900;
      transition:transform .11s ease;
    }
    .back-link svg{
      width:24px;
      height:24px;
      display:block;
      fill:none;
      stroke:currentColor;
      stroke-width:2.4;
      stroke-linecap:round;
      stroke-linejoin:round;
      transform:translateX(-1px);
    }
    .back-link:active{ transform:scale(.965); }

    .page-title{
      margin:0;
      font-family:"LiteraturnayaMenu", Georgia, serif;
      font-size:clamp(42px, 11vw, 58px);
      font-weight:400;
      line-height:.95;
      letter-spacing:.015em;
      text-align:center;
      text-shadow:0 6px 18px rgba(0,0,0,.58), 0 0 1px rgba(255,255,255,.42);
    }

    .title-divider{
      width:min(170px, 45vw);
      margin:12px auto 0;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      color:var(--gold);
    }
    .title-divider::before,
    .title-divider::after{ content:""; height:1px; background:linear-gradient(90deg, transparent, rgba(193,145,84,.45)); }
    .title-divider::after{ background:linear-gradient(90deg, rgba(193,145,84,.45), transparent); }
    .title-divider span{ width:8px; height:8px; display:block; border-radius:2px; background:var(--gold); transform:rotate(45deg); }

    .section-title{
      margin:0 0 12px;
      font-size:20px;
      font-weight:900;
      letter-spacing:-.02em;
    }

    .tournament-list{ display:grid; gap:14px; }
    .tournament-card{
      min-height:82px;
      width:100%;
      padding:15px 22px;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:17px;
      border-radius:10px;
      color:var(--text);
      text-align:left;
      text-decoration:none;
      font-size:24px;
      font-weight:900;
      transition:transform .11s ease;
      touch-action:manipulation;
    }
    .tournament-card:active{ transform:scale(.965); }
    .arrow{
      width:16px;
      height:16px;
      border-top:3px solid rgba(242,238,229,.58);
      border-right:3px solid rgba(242,238,229,.58);
      transform:rotate(45deg);
    }
  </style>
  <link rel="stylesheet" href="assets/liquid-glass.css">
</head>
<body>
  <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true" focusable="false">
    <filter id="liquid-glass-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="8" result="noise"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" result="displaced"></feDisplacementMap>
      <feGaussianBlur in="displaced" stdDeviation="0.2" result="softened"></feGaussianBlur>
      <feComposite in="softened" in2="SourceGraphic" operator="over"></feComposite>
    </filter>
  </svg>

  <a class="back-link liquid-glass-pill" href="index.html" aria-label="Вернуться в главное меню">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M15 6 9 12l6 6"></path>
    </svg>
  </a>

  <main class="page">
    <header>
      <h1 class="page-title">Турниры Красная Поляна</h1>
      <div class="title-divider" aria-hidden="true"><span></span></div>
    </header>

    <section aria-labelledby="tournamentListTitle">
      <h2 id="tournamentListTitle" class="section-title">Список турниров</h2>
      <div class="tournament-list">
        <a class="tournament-card liquid-glass" href="tournament-2026-05-10.html">
          <span>10.05.26</span>
          <span class="arrow" aria-hidden="true"></span>
        </a>
      </div>
    </section>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg){
      tg.ready();
      tg.expand?.();
      document.documentElement.style.setProperty('--tg-safe-area-top', `${tg.safeAreaInset?.top || 0}px`);
    }
  </script>
</body>
</html>
