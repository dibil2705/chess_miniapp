  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Главное меню</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face{
      font-family:"LiteraturnayaMenu";
      src:url("assets/font/TEST-literaturnaya_book.otf") format("opentype");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg:#111;
      --text:#f2eee5;
      --muted:rgba(242,238,229,.58);
      --gold:#c19154;
      --gold-soft:rgba(193,145,84,.46);
      --panel:rgba(255,255,255,.035);
      --border:rgba(255,255,255,.12);
      --tg-safe-area-top:0px;
      --app-safe-top:max(env(safe-area-inset-top), var(--tg-safe-area-top));
    }

    *, *::before, *::after{ box-sizing:border-box; }

    html{
      min-height:100%;
      min-height:100svh;
      min-height:100dvh;
      background:var(--bg);
      -webkit-text-size-adjust:100%;
    }

    body{
      margin:0;
      min-height:100%;
      min-height:100svh;
      min-height:100dvh;
      padding:calc(18px + var(--app-safe-top)) 17px calc(18px + env(safe-area-inset-bottom));
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% -12%, rgba(193,145,84,.18), transparent 34%),
        radial-gradient(circle at 50% 112%, rgba(118,150,86,.16), transparent 42%),
        linear-gradient(160deg, #171817 0%, #0f100f 48%, #0a0b0a 100%);
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:radial-gradient(circle at 50% 36%, #000, transparent 72%);
      opacity:.34;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle at center, transparent 32%, rgba(0,0,0,.46) 100%);
    }

    .menu-shell{
      position:relative;
      z-index:1;
      width:min(100%, 378px);
      min-height:calc(100dvh - 36px - var(--app-safe-top) - env(safe-area-inset-bottom));
      margin:0 auto;
      display:flex;
      flex-direction:column;
      justify-content:center;
      transform:translateY(-16px);
      gap:32px;
    }

    .menu-head{
      display:grid;
      justify-items:center;
      gap:13px;
      text-align:center;
    }

    .horse-row{
      width:min(286px, 78vw);
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:22px;
      color:var(--gold);
    }

    .horse-row::before,
    .horse-row::after{
      content:"";
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, var(--gold-soft));
      box-shadow:0 0 10px rgba(193,145,84,.18);
    }

    .horse-row::after{ background:linear-gradient(90deg, var(--gold-soft), transparent); }

    .horse-mark{
      font-size:58px;
      line-height:.9;
      color:transparent;
      -webkit-text-stroke:1.5px var(--gold);
      text-shadow:0 0 16px rgba(193,145,84,.2);
      transform:translateY(-2px);
    }

    .menu-title{
      margin:0;
      font-family:"LiteraturnayaMenu", Georgia, serif;
      font-size:clamp(48px, 12vw, 66px);
      font-weight:400;
      line-height:.95;
      letter-spacing:.015em;
      color:var(--text);
      text-shadow:0 6px 18px rgba(0,0,0,.58), 0 0 1px rgba(255,255,255,.42);
    }

    .title-divider{
      width:min(170px, 45vw);
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      color:var(--gold);
    }

    .title-divider::before,
    .title-divider::after{
      content:"";
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(193,145,84,.45));
    }

    .title-divider::after{ background:linear-gradient(90deg, rgba(193,145,84,.45), transparent); }

    .title-divider span{
      width:8px;
      height:8px;
      display:block;
      border-radius:2px;
      background:var(--gold);
      transform:rotate(45deg);
      box-shadow:0 0 14px rgba(193,145,84,.42);
    }

    .menu-actions{
      display:grid;
      gap:34px;
    }

    .menu-btn{
      min-height:82px;
      width:100%;
      padding:15px 22px;
      display:grid;
      grid-template-columns:44px 1fr auto;
      align-items:center;
      gap:17px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.105);
      background:
        linear-gradient(145deg, rgba(255,255,255,.048), rgba(255,255,255,.012)),
        rgba(18,20,19,.90);
      color:var(--text);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.055),
        0 14px 34px rgba(0,0,0,.26);
      text-align:left;
      text-decoration:none;
      transform:scale(1);
      transition:transform .11s ease;
      user-select:none;
      touch-action:manipulation;
    }

    .menu-btn:hover{
      color:var(--text);
      transform:scale(1);
    }

    .menu-btn:focus{ outline:none; }

    .menu-btn:focus-visible{
      outline:1px solid rgba(193,145,84,.45);
      outline-offset:3px;
    }

    .menu-btn:active{ transform:scale(.965); }

    .menu-icon{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      color:var(--gold);
      filter:drop-shadow(0 5px 12px rgba(193,145,84,.18));
    }

    .menu-icon svg{
      width:40px;
      height:40px;
      display:block;
      fill:none;
      stroke:currentColor;
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .menu-btn-text{
      font-size:clamp(23px, 6vw, 26px);
      font-family:"Roboto Condensed","Arial Narrow","Segoe UI",Arial,sans-serif;
      font-weight:400;
      line-height:1.18;
      letter-spacing:-.03em;
      text-shadow:0 4px 14px rgba(0,0,0,.62);
    }

    .menu-arrow{
      width:16px;
      height:16px;
      border-top:3px solid rgba(242,238,229,.58);
      border-right:3px solid rgba(242,238,229,.58);
      transform:rotate(45deg);
      filter:drop-shadow(0 3px 6px rgba(0,0,0,.45));
    }

    @media (max-width:480px){
      .menu-shell{ gap:30px; }
      .horse-mark{ font-size:56px; }
      .menu-actions{ gap:34px; }
      .menu-btn{ min-height:82px; padding:15px 21px; border-radius:10px; }
    }

    @media (max-height:680px){
      .menu-shell{ gap:22px; }
      .menu-head{ gap:9px; }
      .horse-mark{ font-size:46px; }
      .menu-btn{ min-height:76px; }
      .menu-actions{ gap:22px; }
    }
  </style>
  <link rel="stylesheet" href="assets/liquid-glass.css">
</head>
<body>
  <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true" focusable="false">
    <filter id="liquid-glass-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="8" result="noise"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" result="displaced"></feDisplacementMap>
      <feGaussianBlur in="displaced" stdDeviation="0.2" result="softened"></feGaussianBlur>
      <feComposite in="softened" in2="SourceGraphic" operator="over"></feComposite>
    </filter>
  </svg>
  <main class="menu-shell" aria-labelledby="menuTitle">
    <header class="menu-head">
      <div class="horse-row" aria-hidden="true">
        <div class="horse-mark">♞</div>
      </div>
      <h1 id="menuTitle" class="menu-title">Главное меню</h1>
      <div class="title-divider" aria-hidden="true"><span></span></div>
    </header>

    <nav class="menu-actions" aria-label="Главное меню">
      <a class="menu-btn liquid-glass" href="tasks.html">
        <span class="menu-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48">
            <rect x="11" y="10" width="26" height="30" rx="4"></rect>
            <path d="M17 18h14"></path>
            <path d="M17 25h14"></path>
            <path d="M17 32h9"></path>
            <path d="M32 35l5 5"></path>
          </svg>
        </span>
        <span class="menu-btn-text">Задачи</span>
        <span class="menu-arrow" aria-hidden="true"></span>
      </a>
      <a class="menu-btn liquid-glass" href="tournament-results.html">
        <span class="menu-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48">
            <path d="M17 10h14v8c0 8-4 13-7 13s-7-5-7-13z"></path>
            <path d="M17 14h-6v4c0 5 3 8 7 9"></path>
            <path d="M31 14h6v4c0 5-3 8-7 9"></path>
            <path d="M24 31v6"></path>
            <path d="M17 39h14"></path>
            <path d="M14 43h20"></path>
          </svg>
        </span>
        <span class="menu-btn-text">Результаты<br>турнира</span>
        <span class="menu-arrow" aria-hidden="true"></span>
      </a>
    </nav>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg){
      tg.ready();
      tg.expand?.();
      document.documentElement.style.setProperty('--tg-safe-area-top', `${tg.safeAreaInset?.top || 0}px`);
    }
  </script>
</body>
</html>
